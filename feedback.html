<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contactez-nous — RemplaCare</title>
<meta name="description" content="Une question, un bug, une idée ? Écris-nous directement.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Jost:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { --navy:#1C324A; --sage:#77A895; --bg:#FAFAF7; --muted:#6B7280; }
  * { box-sizing:border-box; }
  html,body { margin:0; min-height:100%; background:var(--bg); font-family:'Jost',sans-serif; }
  header { background:var(--navy); padding:28px 20px; text-align:center; }
  header a { color:#fff; text-decoration:none; font-family:'Fraunces',serif; font-weight:700; font-size:26px; }
  header .a { color:var(--sage); }
  main { max-width:640px; margin:0 auto; padding:36px 20px 60px; }
  h1 { font-family:'Fraunces',serif; font-weight:600; color:var(--navy); font-size:24px; margin:0 0 8px; text-align:center; }
  p.intro { color:var(--muted); font-size:15px; text-align:center; margin:0 0 30px; }
  iframe { width:100%; min-height:560px; border:none; border-radius:14px; background:#fff; }
  footer { text-align:center; color:var(--muted); font-size:13px; padding:20px 20px 50px; }
  footer a { color:var(--muted); margin:0 8px; }
</style>
</head>
<body>
<header><a href="/">rempl<span class="a">a</span> care</a></header>
<main>
  <h1>Contactez-nous</h1>
  <p class="intro">Un bug, une idée, une question ? Dis-nous tout — chaque retour compte, surtout en ce moment.</p>

  <!-- Remplace TALLY_FORM_ID par l'ID réel de ton formulaire Tally -->
  <iframe src="https://tally.so/embed/PRXXW?alignLeft=1&hideTitle=1&transparentBackground=1" loading="lazy"></iframe>
</main>
<footer>
  <a href="/cgu">CGU</a> · <a href="/confidentialite">Confidentialité</a><br>
  © 2026 RemplaCare — contact@remplacare.fr
</footer>
</body>
</html>
