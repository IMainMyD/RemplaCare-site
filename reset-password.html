<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mot de passe oublié — RemplaCare</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Jost:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root { --navy:#1C324A; --sage:#77A895; --bg:#FAFAF7; --text:#2A2A2A; --muted:#6B7280; --danger:#E04F4F; --line:#E5E7EB; }
  * { box-sizing:border-box; }
  html,body { margin:0; min-height:100%; }
  body { background:var(--navy); font-family:'Jost',sans-serif; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:24px; min-height:100vh; }
  .logo { font-family:'Fraunces',serif; font-weight:700; font-size:30px; color:#fff; margin:0 0 28px; text-align:center; }
  .logo .a { color:var(--sage); }
  .card { background:var(--bg); border-radius:16px; padding:36px 28px; max-width:400px; width:100%; }
  h1 { font-family:'Fraunces',serif; font-weight:600; color:var(--navy); font-size:21px; margin:0 0 8px; }
  p { color:var(--muted); font-size:14.5px; line-height:1.6; margin:0 0 22px; }
  label { display:block; font-size:13px; color:var(--navy); font-weight:600; margin-bottom:6px; }
  input[type=email] { width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:10px;
    font-family:'Jost',sans-serif; font-size:15px; margin-bottom:16px; }
  input[type=email]:focus { outline:2px solid var(--sage); border-color:transparent; }
  button { width:100%; padding:13px; border:none; border-radius:24px; background:var(--sage); color:#fff;
    font-family:'Jost',sans-serif; font-weight:600; font-size:15px; cursor:pointer; }
  button:disabled { opacity:.6; cursor:default; }
  .msg { font-size:14px; margin-top:16px; padding:12px 14px; border-radius:10px; display:none; }
  .msg.ok { background:#E8F5EE; color:#1B7A45; display:block; }
  .msg.err { background:#FDEDED; color:var(--danger); display:block; }
  .back { display:block; text-align:center; margin-top:22px; font-size:13px; color:var(--muted); text-decoration:none; }
</style>
</head>
<body>
  <div class="logo">rempl<span class="a">a</span> care</div>
  <div class="card">
    <h1>Mot de passe oublié</h1>
    <p>Saisis l'adresse email de ton compte. Si elle existe, tu recevras un lien pour choisir un nouveau mot de passe.</p>
    <form id="resetForm">
      <label for="email">Adresse email</label>
      <input type="email" id="email" required placeholder="toi@exemple.fr" autocomplete="email">
      <button type="submit" id="submitBtn">Envoyer le lien</button>
    </form>
    <div class="msg" id="msg"></div>
    <a class="back" href="/">← Retour à l'accueil</a>
  </div>

<script>
  const SUPABASE_URL = "https://eyackplrxyqsrrpsmarz.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5YWNrcGxyeHlxc3JycHNtYXJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MDMxMjUsImV4cCI6MjA5NDA3OTEyNX0.Png9VY6FIYLIDY5EeI0avymkxOz9EJcGyo9MBbI86MY";
  // Doit correspondre EXACTEMENT à une Redirect URL autorisée dans Supabase (Authentication > URL Configuration)
  const REDIRECT_TO = "remplacare://reset-password";

  const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById('resetForm');
  const msg = document.getElementById('msg');
  const btn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    if (!email) return;

    btn.disabled = true;
    btn.textContent = 'Envoi en cours…';
    msg.className = 'msg';
    msg.textContent = '';

    const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: REDIRECT_TO,
    });

    // Message identique que l'email existe ou non (anti-énumération de comptes)
    msg.className = 'msg ok';
    msg.textContent = "Si un compte existe avec cette adresse, un email vient d'être envoyé avec un lien pour réinitialiser ton mot de passe.";
    form.reset();
    btn.disabled = false;
    btn.textContent = 'Envoyer le lien';

    if (error) console.warn('reset error (non exposé à l\'utilisateur) :', error.message);
  });
</script>
</body>
</html>
